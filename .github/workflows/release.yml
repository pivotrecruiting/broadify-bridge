name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode (skip release creation)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: mac-arm64
            dist_script: dist:mac:arm64
          - os: windows-latest
            artifact: win-x64
            dist_script: dist:win
          - os: ubuntu-latest
            artifact: linux-x64
            dist_script: dist:linux

    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SKIP_DECKLINK_HELPER_BUILD: "1"
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_CODE_SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
      AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
      AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME }}
      AZURE_CODE_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_CODE_SIGNING_PUBLISHER_NAME }}
      DECKLINK_HELPER_URL_ARM64: ${{ secrets.DECKLINK_HELPER_URL_ARM64 }}
      DECKLINK_HELPER_SHA256_ARM64: ${{ secrets.DECKLINK_HELPER_SHA256_ARM64 }}
      DECKLINK_HELPER_URL_X64: ${{ secrets.DECKLINK_HELPER_URL_X64 }}
      DECKLINK_HELPER_SHA256_X64: ${{ secrets.DECKLINK_HELPER_SHA256_X64 }}
      BRIDGE_RELAY_JWKS_URL: ${{ secrets.BRIDGE_RELAY_JWKS_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/bridge/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install Bridge dependencies
        run: |
          cd apps/bridge
          npm ci

      - name: Build Bridge (apps/bridge)
        run: |
          cd apps/bridge
          npm run build

      - name: Transpile Electron
        run: npm run transpile:electron

      - name: Build React
        run: npm run build

      - name: Prepare Bridge config for packaging
        shell: bash
        run: |
          mkdir -p apps/bridge/dist
          if [ -n "${BRIDGE_RELAY_JWKS_URL:-}" ]; then
            node -e "
              const fs = require('fs');
              const p = 'config/default.json';
              const c = JSON.parse(fs.readFileSync(p, 'utf8'));
              c.relay = c.relay || {};
              c.relay.jwksUrl = process.env.BRIDGE_RELAY_JWKS_URL;
              fs.writeFileSync(p, JSON.stringify(c, null, 2));
            "
          fi
          echo "Bridge config prepared"

      - name: Install SDL2 (macOS, for display-helper)
        if: matrix.os == 'macos-15'
        run: brew install sdl2

      # node-gyp (used by build:framebus) requires distutils, removed in Python 3.12+
      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Import macOS signing certificate for native helper codesign
        if: matrix.os == 'macos-15' && env.CSC_LINK != '' && env.CSC_KEY_PASSWORD != '' && env.APPLE_SIGNING_IDENTITY != ''
        shell: bash
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/broadify-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/broadify-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          if [[ "${CSC_LINK}" == file://* ]]; then
            cp "${CSC_LINK#file://}" "$CERT_PATH"
          elif [[ "${CSC_LINK}" == http://* || "${CSC_LINK}" == https://* ]]; then
            curl -fsSL "$CSC_LINK" -o "$CERT_PATH"
          else
            CERT_B64="$CSC_LINK"
            if [[ "$CERT_B64" == data:*base64,* ]]; then
              CERT_B64="${CERT_B64#*,}"
            fi
            printf '%s' "$CERT_B64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          CURRENT_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
          # Keep existing keychains in the search list so other tooling still works.
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $CURRENT_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Electron App
        run: npm run ${{ matrix.dist_script }} -- --publish=never

      - name: Verify Windows signatures
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist -Recurse -Include *.exe,*.msi
          if (-not $files) {
            throw "No Windows artifacts found in dist/ for signature verification."
          }
          foreach ($file in $files) {
            Write-Host "Verifying signature:" $file.FullName
            & signtool verify /pa /v $file.FullName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !inputs.test_mode || github.event_name != 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts for debugging
        run: |
          echo "Artifacts structure:"
          find artifacts -type f -name "*" | sort || true

      - name: Rename duplicate files to avoid conflicts
        run: |
          # Remove builder-debug.yml files (not needed for releases)
          find artifacts -name "builder-debug.yml" -delete 2>/dev/null || true
          # Rename latest-mac.yml files to be unique per macOS architecture
          if [ -f "artifacts/mac-arm64/latest-mac.yml" ]; then
            mv "artifacts/mac-arm64/latest-mac.yml" "artifacts/mac-arm64/latest-mac-arm64.yml" 2>/dev/null || true
          fi
          if [ -f "artifacts/mac-x64/latest-mac.yml" ]; then
            mv "artifacts/mac-x64/latest-mac.yml" "artifacts/mac-x64/latest-mac-x64.yml" 2>/dev/null || true
          fi
          echo "Final artifacts structure:"
          find artifacts -type f | sort || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
