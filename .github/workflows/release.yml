name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode (skip release creation)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: mac-arm64
            dist_script: dist:mac:arm64
          - os: windows-latest
            artifact: win-x64
            dist_script: dist:win
          - os: ubuntu-22.04
            artifact: linux-x64
            dist_script: dist:linux

    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SKIP_DECKLINK_HELPER_BUILD: "1"
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_CODE_SIGNING_ENDPOINT: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
      AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
      AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME }}
      AZURE_CODE_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_CODE_SIGNING_PUBLISHER_NAME }}
      DECKLINK_HELPER_URL_ARM64: ${{ secrets.DECKLINK_HELPER_URL_ARM64 }}
      DECKLINK_HELPER_SHA256_ARM64: ${{ secrets.DECKLINK_HELPER_SHA256_ARM64 }}
      DECKLINK_HELPER_URL_X64: ${{ secrets.DECKLINK_HELPER_URL_X64 }}
      DECKLINK_HELPER_SHA256_X64: ${{ secrets.DECKLINK_HELPER_SHA256_X64 }}
      SDL2_MACOS_URL_ARM64: ${{ secrets.SDL2_MACOS_URL_ARM64 }}
      SDL2_MACOS_SHA256_ARM64: ${{ secrets.SDL2_MACOS_SHA256_ARM64 }}
      SDL2_MACOS_URL_X64: ${{ secrets.SDL2_MACOS_URL_X64 }}
      SDL2_MACOS_SHA256_X64: ${{ secrets.SDL2_MACOS_SHA256_X64 }}
      BRIDGE_RELAY_JWKS_URL: ${{ secrets.BRIDGE_RELAY_JWKS_URL }}
      RELAY_URL: ${{ secrets.RELAY_URL }}
      DISPLAY_HELPER_MACOSX_DEPLOYMENT_TARGET: "13.0"
      DECKLINK_HELPER_MACOSX_DEPLOYMENT_TARGET: "13.0"
      MACOS_FLOOR_VERSION: "13.0"
      SDL2_STRICT_MINOS: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release channel
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME:-}"
          CHANNEL="latest"

          if [[ "$TAG_NAME" == *"-rc."* ]]; then
            CHANNEL="rc"
          fi

          echo "BROADIFY_UPDATER_CHANNEL=$CHANNEL" >> "$GITHUB_ENV"
          echo "Resolved updater channel: $CHANNEL"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/bridge/package-lock.json

      - name: Install root deps
        if: matrix.os != 'windows-latest'
        run: npm ci

      - name: Install root deps (Windows, retry)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Running npm ci (attempt $attempt/$maxAttempts)..."
            & npm ci

            if ($LASTEXITCODE -eq 0) {
              Write-Host "npm ci succeeded."
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Warning "npm ci failed with exit code $LASTEXITCODE. Retrying in 20 seconds..."
              Start-Sleep -Seconds 20
            }
          }

          throw "npm ci failed after $maxAttempts attempts."

      - name: Install Bridge dependencies
        if: matrix.os != 'windows-latest'
        run: |
          cd apps/bridge
          npm ci

      - name: Install Bridge dependencies (Windows, retry)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Running apps/bridge npm ci (attempt $attempt/$maxAttempts)..."
            Push-Location apps/bridge
            & npm ci
            $exitCode = $LASTEXITCODE
            Pop-Location

            if ($exitCode -eq 0) {
              Write-Host "apps/bridge npm ci succeeded."
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Warning "apps/bridge npm ci failed with exit code $exitCode. Retrying in 20 seconds..."
              Start-Sleep -Seconds 20
            }
          }

          throw "apps/bridge npm ci failed after $maxAttempts attempts."

      - name: Install Linux packaging dependencies (AppImage)
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          if apt-cache show libfuse2 >/dev/null 2>&1; then
            sudo apt-get install -y libfuse2 file
          else
            sudo apt-get install -y libfuse2t64 file
          fi

      - name: Build Bridge (apps/bridge)
        run: |
          cd apps/bridge
          npm run build

      - name: Transpile Electron
        run: npm run transpile:electron

      - name: Build React
        run: npm run build

      - name: Prepare Bridge config for packaging
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p apps/bridge/dist
          {
            echo "# Generated by release workflow"
            echo "BROADIFY_UPDATER_CHANNEL=${BROADIFY_UPDATER_CHANNEL:-latest}"
            if [ -n "${RELAY_URL:-}" ]; then
              echo "RELAY_URL=${RELAY_URL}"
            fi
          } > apps/bridge/dist/.env
          if [ -n "${BRIDGE_RELAY_JWKS_URL:-}" ]; then
            node -e "
              const fs = require('fs');
              const p = 'config/default.json';
              const c = JSON.parse(fs.readFileSync(p, 'utf8'));
              c.relay = c.relay || {};
              c.relay.jwksUrl = process.env.BRIDGE_RELAY_JWKS_URL;
              fs.writeFileSync(p, JSON.stringify(c, null, 2));
            "
          fi
          echo "Bridge config prepared"

      - name: Resolve SDL2 bundle (macOS, for display-helper)
        if: matrix.os == 'macos-15'
        run: npm run ensure:sdl2-macos

      # node-gyp (used by build:framebus) requires distutils, removed in Python 3.12+
      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup MSVC Developer Command Prompt (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install SDL2 (Windows, for display-helper)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            if (Test-Path 'C:\vcpkg') {
              $vcpkgRoot = 'C:\vcpkg'
            } else {
              $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
            }
          }

          if (-not (Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }

          $vcpkgExe = Join-Path $vcpkgRoot 'vcpkg.exe'
          if (-not (Test-Path $vcpkgExe)) {
            & (Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat') -disableMetrics
          }

          & $vcpkgExe install sdl2:x64-windows

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SDL2_DIR=$(Join-Path $vcpkgRoot 'installed\x64-windows')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate Windows Trusted Signing configuration
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_VARS=(
            AZURE_CODE_SIGNING_ENDPOINT
            AZURE_CODE_SIGNING_ACCOUNT_NAME
            AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME
            AZURE_CODE_SIGNING_PUBLISHER_NAME
          )

          MISSING=()
          for var_name in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              MISSING+=("$var_name")
            fi
          done

          if (( ${#MISSING[@]} > 0 )); then
            echo "Missing Windows Trusted Signing secrets: ${MISSING[*]}" >&2
            exit 1
          fi

      - name: Import macOS signing certificate for native helper codesign
        if: matrix.os == 'macos-15' && env.CSC_LINK != '' && env.CSC_KEY_PASSWORD != '' && env.APPLE_SIGNING_IDENTITY != ''
        shell: bash
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/broadify-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/broadify-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          if [[ "${CSC_LINK}" == file://* ]]; then
            cp "${CSC_LINK#file://}" "$CERT_PATH"
          elif [[ "${CSC_LINK}" == http://* || "${CSC_LINK}" == https://* ]]; then
            curl -fsSL "$CSC_LINK" -o "$CERT_PATH"
          else
            CERT_B64="$CSC_LINK"
            if [[ "$CERT_B64" == data:*base64,* ]]; then
              CERT_B64="${CERT_B64#*,}"
            fi
            printf '%s' "$CERT_B64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          CURRENT_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
          # Keep existing keychains in the search list so other tooling still works.
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $CURRENT_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare Apple notary API key file
        if: matrix.os == 'macos-15' && env.APPLE_API_KEY != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != ''
        shell: bash
        run: |
          set -euo pipefail

          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

          if [[ "${APPLE_API_KEY}" == "-----BEGIN PRIVATE KEY-----"* ]]; then
            # Secret contains raw .p8 contents (multiline PEM).
            printf '%s' "$APPLE_API_KEY" > "$NOTARY_KEY_PATH"
          else
            KEY_B64="$APPLE_API_KEY"
            if [[ "$KEY_B64" == data:*base64,* ]]; then
              KEY_B64="${KEY_B64#*,}"
            fi
            # Secret contains base64-encoded .p8 content.
            printf '%s' "$KEY_B64" | base64 -D > "$NOTARY_KEY_PATH"
          fi

          chmod 600 "$NOTARY_KEY_PATH"
          echo "APPLE_API_KEY=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build Electron App
        if: ${{ !startsWith(matrix.os, 'ubuntu-') }}
        run: npm run ${{ matrix.dist_script }} -- --publish=never

      - name: Linux packaging diagnostics
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -euo pipefail
          APP_BUILDER="node_modules/app-builder-bin/linux/x64/app-builder"
          ls -lah "$APP_BUILDER"
          file "$APP_BUILDER"
          ldd "$APP_BUILDER" || true

      - name: Build Electron App (Linux, debug)
        if: startsWith(matrix.os, 'ubuntu-')
        env:
          DEBUG: electron-builder,builder-util
          ELECTRON_BUILDER_LOG_LEVEL: debug
        run: npm run ${{ matrix.dist_script }} -- --publish=never

      - name: Verify Windows signatures
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $signtool = (Get-Command signtool -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty Source)
          if (-not $signtool) {
            $candidates = @()
            $candidates += Get-ChildItem "$env:ProgramFiles(x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue
            $candidates += Get-ChildItem "$env:LOCALAPPDATA\TrustedSigning\Microsoft.Windows.SDK.BuildTools" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue
            $signtool = $candidates |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signtool) {
            throw "signtool.exe not found on runner (PATH/Windows SDK/TrustedSigning cache)."
          }
          Write-Host "Using signtool:" $signtool

          $files = Get-ChildItem -Path dist -Recurse -Include *.exe,*.msi
          if (-not $files) {
            throw "No Windows artifacts found in dist/ for signature verification."
          }
          foreach ($file in $files) {
            Write-Host "Verifying signature:" $file.FullName
            & $signtool verify /pa /v $file.FullName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !inputs.test_mode || github.event_name != 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts for debugging
        run: |
          echo "Artifacts structure:"
          find artifacts -type f -name "*" | sort || true

      - name: Prepare release artifacts
        run: |
          # Remove builder-debug.yml files (not needed for releases)
          find artifacts -name "builder-debug.yml" -delete 2>/dev/null || true
          echo "Final artifacts structure:"
          find artifacts -type f | sort || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          generate_release_notes: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
