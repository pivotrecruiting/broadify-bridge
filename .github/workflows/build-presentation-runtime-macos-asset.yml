name: Build Presentation Runtime macOS Asset

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "GitHub runner label for the presentation runtime build"
        required: true
        default: "macos-15"
        type: string
      publish_release:
        description: "Publish the bundle to a dedicated GitHub release"
        required: true
        default: true
        type: boolean
      release_tag:
        description: "Optional override for the presentation runtime asset release tag"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ inputs.runner_label }}
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show runner details
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          uname -a
          xcodebuild -version

      - name: Validate signing configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            echo "APPLE_SIGNING_IDENTITY secret is required to sign the presentation runtime asset." >&2
            exit 1
          fi
          if [[ -z "${CSC_LINK:-}" || -z "${CSC_KEY_PASSWORD:-}" ]]; then
            echo "CSC_LINK and CSC_KEY_PASSWORD secrets are required to import the signing certificate." >&2
            exit 1
          fi

      - name: Import macOS signing certificate
        shell: bash
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/broadify-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/broadify-signing-keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          if [[ "${CSC_LINK}" == file://* ]]; then
            cp "${CSC_LINK#file://}" "$CERT_PATH"
          elif [[ "${CSC_LINK}" == http://* || "${CSC_LINK}" == https://* ]]; then
            curl -fsSL "$CSC_LINK" -o "$CERT_PATH"
          else
            CERT_B64="$CSC_LINK"
            if [[ "$CERT_B64" == data:*base64,* ]]; then
              CERT_B64="${CERT_B64#*,}"
            fi
            printf '%s' "$CERT_B64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          CURRENT_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $CURRENT_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare signed presentation runtime release bundle
        shell: bash
        run: npm run prepare:presentation-runtime-macos-release

      - name: Resolve artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          artifact_path="$(find apps/bridge/vendor/presentation-runtime -maxdepth 1 -type f -name 'presentation-runtime-macos-arm64.tar.gz' | head -n 1)"
          if [[ -z "$artifact_path" ]]; then
            echo "Presentation runtime release bundle was not created." >&2
            exit 1
          fi

          artifact_name="$(basename "$artifact_path")"
          artifact_sha="$(shasum -a 256 "$artifact_path" | awk '{print $1}')"
          lo_version="$(node -pe "JSON.parse(require('fs').readFileSync('apps/bridge/vendor/presentation-runtime/manifest.json','utf8')).libreoffice_version")"
          release_tag="${{ inputs.release_tag }}"

          if [[ -z "$release_tag" ]]; then
            release_tag="deps-presentation-runtime-${lo_version}-macos-arm64"
          fi

          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/${artifact_name}"

          {
            echo "artifact_path=${artifact_path}"
            echo "artifact_name=${artifact_name}"
            echo "artifact_sha=${artifact_sha}"
            echo "release_tag=${release_tag}"
            echo "release_url=${release_url}"
            echo "lo_version=${lo_version}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Presentation runtime macOS asset"
            echo ""
            echo "- LibreOffice version: \`${lo_version}\`"
            echo "- Runner arch: \`arm64\`"
            echo "- Artifact: \`${artifact_name}\`"
            echo "- SHA256: \`${artifact_sha}\`"
            echo "- Release tag: \`${release_tag}\`"
            echo "- Release URL: \`${release_url}\`"
            echo ""
            echo "Set these GitHub Actions secrets in the bridge repo:"
            echo ""
            echo "- \`PRESENTATION_RUNTIME_URL_ARM64\` = \`${release_url}\`"
            echo "- \`PRESENTATION_RUNTIME_SHA256_ARM64\` = \`${artifact_sha}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload presentation runtime bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.artifact_path }}
          if-no-files-found: error

      - name: Publish presentation runtime bundle to GitHub release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          ARTIFACT_PATH: ${{ steps.meta.outputs.artifact_path }}
          LO_VERSION: ${{ steps.meta.outputs.lo_version }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ARTIFACT_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$ARTIFACT_PATH" \
              --title "Presentation Runtime macOS Bundle ${RELEASE_TAG}" \
              --notes "Pinned pre-signed LibreOffice ${LO_VERSION} bundle for Broadify Bridge macOS arm64 release builds."
          fi
