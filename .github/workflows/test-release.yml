name: Test Release Build

on:
  push:
    branches:
      - test-release
      - test-release/**
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Relay and updater configuration to validate"
        required: true
        default: rc
        type: choice
        options:
          - rc
          - latest

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: mac-arm64
            dist_script: dist:mac:arm64
          - os: windows-2022
            artifact: win-x64
            dist_script: dist:win

    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SKIP_DECKLINK_HELPER_BUILD: "1"
      APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-15' && secrets.APPLE_SIGNING_IDENTITY || '' }}
      CSC_LINK: ${{ matrix.os == 'macos-15' && secrets.CSC_LINK || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-15' && secrets.CSC_KEY_PASSWORD || '' }}
      APPLE_API_KEY: ${{ matrix.os == 'macos-15' && secrets.APPLE_API_KEY || '' }}
      APPLE_API_KEY_ID: ${{ matrix.os == 'macos-15' && secrets.APPLE_API_KEY_ID || '' }}
      APPLE_API_ISSUER: ${{ matrix.os == 'macos-15' && secrets.APPLE_API_ISSUER || '' }}
      VCAM_APP_PROVISION_PROFILE: ${{ matrix.os == 'macos-15' && secrets.VCAM_APP_PROVISION_PROFILE || '' }}
      DECKLINK_HELPER_URL_ARM64: ${{ matrix.os == 'macos-15' && secrets.DECKLINK_HELPER_URL_ARM64 || '' }}
      DECKLINK_HELPER_SHA256_ARM64: ${{ matrix.os == 'macos-15' && secrets.DECKLINK_HELPER_SHA256_ARM64 || '' }}
      DECKLINK_HELPER_URL_X64: ${{ matrix.os == 'macos-15' && secrets.DECKLINK_HELPER_URL_X64 || '' }}
      DECKLINK_HELPER_SHA256_X64: ${{ matrix.os == 'macos-15' && secrets.DECKLINK_HELPER_SHA256_X64 || '' }}
      SDL2_MACOS_URL_ARM64: ${{ matrix.os == 'macos-15' && secrets.SDL2_MACOS_URL_ARM64 || '' }}
      SDL2_MACOS_SHA256_ARM64: ${{ matrix.os == 'macos-15' && secrets.SDL2_MACOS_SHA256_ARM64 || '' }}
      SDL2_MACOS_URL_X64: ${{ matrix.os == 'macos-15' && secrets.SDL2_MACOS_URL_X64 || '' }}
      SDL2_MACOS_SHA256_X64: ${{ matrix.os == 'macos-15' && secrets.SDL2_MACOS_SHA256_X64 || '' }}
      PRESENTATION_RUNTIME_URL_ARM64: ${{ matrix.os == 'macos-15' && secrets.PRESENTATION_RUNTIME_URL_ARM64 || '' }}
      PRESENTATION_RUNTIME_SHA256_ARM64: ${{ matrix.os == 'macos-15' && secrets.PRESENTATION_RUNTIME_SHA256_ARM64 || '' }}
      BRIDGE_RELAY_JWKS_URL: ${{ secrets.BRIDGE_RELAY_JWKS_URL }}
      RELAY_URL: ${{ secrets.RELAY_URL }}
      BRIDGE_RELAY_JWKS_URL_RC: ${{ secrets.BRIDGE_RELAY_JWKS_URL_RC }}
      RELAY_URL_RC: ${{ secrets.RELAY_URL_RC }}
      MODNET_MODEL_URL: ${{ matrix.os == 'windows-2022' && secrets.MODNET_MODEL_URL || '' }}
      MODNET_COREML_MODEL_URL: ${{ matrix.os == 'macos-15' && secrets.MODNET_COREML_MODEL_URL || '' }}
      AZURE_TENANT_ID: ${{ matrix.os == 'windows-2022' && secrets.AZURE_TENANT_ID || '' }}
      AZURE_CLIENT_ID: ${{ matrix.os == 'windows-2022' && secrets.AZURE_CLIENT_ID || '' }}
      AZURE_CLIENT_SECRET: ${{ matrix.os == 'windows-2022' && secrets.AZURE_CLIENT_SECRET || '' }}
      AZURE_CODE_SIGNING_ENDPOINT: ${{ matrix.os == 'windows-2022' && secrets.AZURE_CODE_SIGNING_ENDPOINT || '' }}
      AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ matrix.os == 'windows-2022' && secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME || '' }}
      AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ matrix.os == 'windows-2022' && secrets.AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME || '' }}
      AZURE_CODE_SIGNING_PUBLISHER_NAME: ${{ matrix.os == 'windows-2022' && secrets.AZURE_CODE_SIGNING_PUBLISHER_NAME || '' }}
      DISPLAY_HELPER_MACOSX_DEPLOYMENT_TARGET: "13.0"
      MACOS_FLOOR_VERSION: "13.0"
      SDL2_STRICT_MINOS: "1"
      GYP_MSVS_VERSION: "2022"
      npm_config_msvs_version: "2022"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve test release relay config
        shell: bash
        run: |
          set -euo pipefail

          CHANNEL="rc"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            CHANNEL="${{ inputs.release_channel }}"
          fi

          if [[ "$CHANNEL" == "latest" ]]; then
            RESOLVED_RELAY_URL="${RELAY_URL:-}"
            RESOLVED_RELAY_JWKS_URL="${BRIDGE_RELAY_JWKS_URL:-}"
            ERROR_MESSAGE="Stable release preflight requires RELAY_URL and BRIDGE_RELAY_JWKS_URL secrets."
          else
            RESOLVED_RELAY_URL="${RELAY_URL_RC:-}"
            RESOLVED_RELAY_JWKS_URL="${BRIDGE_RELAY_JWKS_URL_RC:-}"
            ERROR_MESSAGE="Test release preflight requires RELAY_URL_RC and BRIDGE_RELAY_JWKS_URL_RC secrets."
          fi

          if [[ -z "$RESOLVED_RELAY_URL" || -z "$RESOLVED_RELAY_JWKS_URL" ]]; then
            echo "$ERROR_MESSAGE" >&2
            exit 1
          fi

          echo "BROADIFY_UPDATER_CHANNEL=$CHANNEL" >> "$GITHUB_ENV"
          echo "RESOLVED_RELAY_URL=$RESOLVED_RELAY_URL" >> "$GITHUB_ENV"
          echo "RESOLVED_BRIDGE_RELAY_JWKS_URL=$RESOLVED_RELAY_JWKS_URL" >> "$GITHUB_ENV"

      - name: Validate macOS release secrets
        if: matrix.os == 'macos-15'
        shell: bash
        run: |
          set -euo pipefail
          REQUIRED_VARS=(
            APPLE_SIGNING_IDENTITY
            CSC_LINK
            CSC_KEY_PASSWORD
            APPLE_API_KEY
            APPLE_API_KEY_ID
            APPLE_API_ISSUER
            VCAM_APP_PROVISION_PROFILE
            MODNET_COREML_MODEL_URL
            DECKLINK_HELPER_URL_ARM64
            DECKLINK_HELPER_SHA256_ARM64
            PRESENTATION_RUNTIME_URL_ARM64
            PRESENTATION_RUNTIME_SHA256_ARM64
          )
          MISSING=()
          for var_name in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              MISSING+=("$var_name")
            fi
          done
          if (( ${#MISSING[@]} > 0 )); then
            echo "Missing macOS release secrets: ${MISSING[*]}" >&2
            exit 1
          fi

      - name: Validate Windows release secrets
        if: matrix.os == 'windows-2022'
        shell: bash
        run: |
          set -euo pipefail
          REQUIRED_VARS=(
            AZURE_TENANT_ID
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_CODE_SIGNING_ENDPOINT
            AZURE_CODE_SIGNING_ACCOUNT_NAME
            AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME
            AZURE_CODE_SIGNING_PUBLISHER_NAME
            MODNET_MODEL_URL
          )
          MISSING=()
          for var_name in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              MISSING+=("$var_name")
            fi
          done
          if (( ${#MISSING[@]} > 0 )); then
            echo "Missing Windows release secrets: ${MISSING[*]}" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/bridge/package-lock.json

      - name: Install root deps
        if: matrix.os != 'windows-2022'
        run: npm ci

      - name: Install root deps (Windows, retry)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Running npm ci (attempt $attempt/$maxAttempts)..."
            & npm ci

            if ($LASTEXITCODE -eq 0) {
              Write-Host "npm ci succeeded."
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Warning "npm ci failed with exit code $LASTEXITCODE. Retrying in 20 seconds..."
              Start-Sleep -Seconds 20
            }
          }

          throw "npm ci failed after $maxAttempts attempts."

      - name: Install Bridge dependencies
        if: matrix.os != 'windows-2022'
        run: |
          cd apps/bridge
          npm ci

      - name: Install Bridge dependencies (Windows, retry)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Running apps/bridge npm ci (attempt $attempt/$maxAttempts)..."
            Push-Location apps/bridge
            & npm ci
            $exitCode = $LASTEXITCODE
            Pop-Location

            if ($exitCode -eq 0) {
              Write-Host "apps/bridge npm ci succeeded."
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Warning "apps/bridge npm ci failed with exit code $exitCode. Retrying in 20 seconds..."
              Start-Sleep -Seconds 20
            }
          }

          throw "apps/bridge npm ci failed after $maxAttempts attempts."

      - name: Install Linux packaging dependencies (AppImage)
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          if apt-cache show libfuse2 >/dev/null 2>&1; then
            sudo apt-get install -y libfuse2 file
          else
            sudo apt-get install -y libfuse2t64 file
          fi

      - name: Build Bridge (apps/bridge)
        run: |
          cd apps/bridge
          npm run build

      - name: Prepare Bridge config for packaging
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p apps/bridge/dist
          {
            echo "# Generated by test release workflow"
            echo "BROADIFY_UPDATER_CHANNEL=${BROADIFY_UPDATER_CHANNEL:-rc}"
            echo "RELAY_URL=${RESOLVED_RELAY_URL}"
            echo "BRIDGE_RELAY_JWKS_URL=${RESOLVED_BRIDGE_RELAY_JWKS_URL}"
          } > apps/bridge/dist/.env

          node -e "
            const fs = require('fs');
            const p = 'config/default.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.relay = c.relay || {};
            c.relay.jwksUrl = process.env.RESOLVED_BRIDGE_RELAY_JWKS_URL;
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "
          echo "Bridge test config prepared"

      - name: Resolve SDL2 bundle (macOS, for display-helper)
        if: matrix.os == 'macos-15'
        run: npm run ensure:sdl2-macos

      - name: Install xcodegen (macOS, for vcam-helper)
        if: matrix.os == 'macos-15'
        run: brew install xcodegen

      # node-gyp (used by build:framebus) requires distutils, removed in Python 3.12+
      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup MSVC Developer Command Prompt (Windows)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: 2022

      - name: Install SDL2 (Windows, for display-helper)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            if (Test-Path 'C:\vcpkg') {
              $vcpkgRoot = 'C:\vcpkg'
            } else {
              $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
            }
          }

          if (-not (Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }

          $vcpkgExe = Join-Path $vcpkgRoot 'vcpkg.exe'
          if (-not (Test-Path $vcpkgExe)) {
            & (Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat') -disableMetrics
          }

          & $vcpkgExe install sdl2:x64-windows

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SDL2_DIR=$(Join-Path $vcpkgRoot 'installed\x64-windows')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install ONNX Runtime DirectML (Windows, for meeting-helper MODNet)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          & .\scripts\prepare-windows-meeting-helper-deps.ps1

      - name: Cache MODNet model (meeting-helper, Windows only)
        if: matrix.os == 'windows-2022'
        uses: actions/cache@v4
        with:
          path: apps/bridge/native/meeting-helper/models/modnet.onnx
          key: modnet-model-${{ hashFiles('apps/bridge/native/meeting-helper/models/manifest.json') }}

      - name: Download MODNet model (meeting-helper, Windows only)
        if: matrix.os == 'windows-2022'
        run: npm run download:modnet-model

      - name: Install Azure Trusted Signing module (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # electron-builder 25.x signs Windows artifacts by invoking
          # `Invoke-TrustedSigning` from the TrustedSigning PowerShell module.
          # The module is not preinstalled on the Windows runner and
          # electron-builder's implicit install is unreliable (results in
          # "cmdlet not recognized"), so install and verify it explicitly.
          if (-not (Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue)) {
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser | Out-Null
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable -Name TrustedSigning)) {
            Install-Module -Name TrustedSigning -Force -Scope CurrentUser -Repository PSGallery
          }
          Import-Module TrustedSigning
          Get-Command Invoke-TrustedSigning | Format-List Name, Version, Source

      - name: Import macOS signing certificate for native helper codesign
        if: matrix.os == 'macos-15' && env.CSC_LINK != '' && env.CSC_KEY_PASSWORD != '' && env.APPLE_SIGNING_IDENTITY != ''
        shell: bash
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/broadify-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/broadify-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          if [[ "${CSC_LINK}" == file://* ]]; then
            cp "${CSC_LINK#file://}" "$CERT_PATH"
          elif [[ "${CSC_LINK}" == http://* || "${CSC_LINK}" == https://* ]]; then
            curl -fsSL "$CSC_LINK" -o "$CERT_PATH"
          else
            CERT_B64="$CSC_LINK"
            if [[ "$CERT_B64" == data:*base64,* ]]; then
              CERT_B64="${CERT_B64#*,}"
            fi
            printf '%s' "$CERT_B64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          CURRENT_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $CURRENT_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare Apple notary API key file
        if: matrix.os == 'macos-15' && env.APPLE_API_KEY != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != ''
        shell: bash
        run: |
          set -euo pipefail

          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          if [[ "${APPLE_API_KEY}" == "-----BEGIN PRIVATE KEY-----"* ]]; then
            printf '%s' "$APPLE_API_KEY" > "$NOTARY_KEY_PATH"
          else
            KEY_B64="$APPLE_API_KEY"
            if [[ "$KEY_B64" == data:*base64,* ]]; then
              KEY_B64="${KEY_B64#*,}"
            fi
            printf '%s' "$KEY_B64" | base64 -D > "$NOTARY_KEY_PATH"
          fi
          chmod 600 "$NOTARY_KEY_PATH"
          echo "APPLE_API_KEY=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install vcam provisioning profile (macOS)
        if: matrix.os == 'macos-15'
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VCAM_APP_PROVISION_PROFILE:-}" ]]; then
            echo "VCAM_APP_PROVISION_PROFILE secret is required for Developer ID vcam signing." >&2
            exit 1
          fi

          LEGACY_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          USERDATA_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$LEGACY_DIR" "$USERDATA_DIR"
          TMP_PROFILE="$(mktemp)"
          PROFILE_VALUE="$VCAM_APP_PROVISION_PROFILE"
          if [[ "$PROFILE_VALUE" == data:*base64,* ]]; then
            PROFILE_VALUE="${PROFILE_VALUE#*,}"
          fi
          printf '%s' "$PROFILE_VALUE" | base64 -D > "$TMP_PROFILE"
          if ! security cms -D -i "$TMP_PROFILE" >/dev/null 2>&1; then
            echo "Decoded VCAM_APP_PROVISION_PROFILE is invalid." >&2
            exit 1
          fi
          cp "$TMP_PROFILE" "$LEGACY_DIR/broadify-vcam-app.provisionprofile"
          cp "$TMP_PROFILE" "$USERDATA_DIR/broadify-vcam-app.provisionprofile"
          rm -f "$TMP_PROFILE"
          echo "VCAM_SIGNING_MODE=developer-id" >> "$GITHUB_ENV"

      - name: Build Electron App
        if: ${{ !startsWith(matrix.os, 'ubuntu-') }}
        run: npm run ${{ matrix.dist_script }}

      - name: Assert Windows installer artifacts
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          $exeFiles = @(Get-ChildItem -Path $dist -File -Filter '*.exe')
          $msiFiles = @(Get-ChildItem -Path $dist -File -Filter '*.msi')
          $latestYml = Join-Path $dist 'latest.yml'

          if ($exeFiles.Count -ne 1) {
            throw "Expected exactly one root Windows NSIS .exe in dist/, found $($exeFiles.Count)."
          }
          if ($msiFiles.Count -ne 1) {
            throw "Expected exactly one root Windows .msi in dist/, found $($msiFiles.Count)."
          }
          if (-not (Test-Path $latestYml)) {
            throw "Missing Windows updater metadata: dist/latest.yml"
          }

          $exeBlockmap = "$($exeFiles[0].FullName).blockmap"
          if (-not (Test-Path $exeBlockmap)) {
            throw "Missing NSIS blockmap: $exeBlockmap"
          }

          $latestContent = Get-Content -Raw -Path $latestYml
          if ($latestContent -notmatch [regex]::Escape($exeFiles[0].Name)) {
            throw "latest.yml does not reference the NSIS installer $($exeFiles[0].Name)."
          }
          if ($latestContent -match '\.msi') {
            throw "latest.yml unexpectedly references the MSI installer; Windows auto-update must use NSIS."
          }

          $packagedDisplayHelperPaths = @(
            (Join-Path $dist 'win-unpacked\resources\native\display-helper\display-helper.exe'),
            (Join-Path $dist 'win-unpacked\resources\native\display-helper\SDL2.dll')
          )
          foreach ($path in $packagedDisplayHelperPaths) {
            if (-not (Test-Path $path)) {
              throw "Windows packaged app is missing display-helper runtime: $path"
            }
          }

          Write-Host "Windows installer artifacts verified:"
          Write-Host "  NSIS: $($exeFiles[0].Name)"
          Write-Host "  MSI:  $($msiFiles[0].Name)"

      - name: Smoke test Windows unpacked display helper
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $helperPath = Join-Path $env:GITHUB_WORKSPACE 'dist\win-unpacked\resources\native\display-helper\display-helper.exe'
          & .\scripts\test-windows-display-helper.ps1 -HelperPath $helperPath -Attempts 3

      - name: Verify Windows signatures
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          & .\scripts\verify-windows-release-signatures.ps1 -DistPath dist

      - name: Smoke test Windows MSI install
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path dist -File -Filter '*.msi' | Select-Object -First 1
          if (-not $msi) {
            throw "No MSI artifact found for smoke test."
          }
          & .\scripts\smoke-test-windows-msi.ps1 -InstallerPath $msi.FullName

      - name: Smoke test Windows NSIS install
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist -File -Filter '*.exe' | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS artifact found for smoke test."
          }
          & .\scripts\smoke-test-windows-nsis.ps1 -InstallerPath $installer.FullName

      - name: Upload Windows MSI smoke logs
        if: failure() && matrix.os == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-smoke-logs-test-${{ matrix.artifact }}
          path: ${{ runner.temp }}/broadify-bridge-msi-smoke*.log
          if-no-files-found: ignore

      - name: Linux packaging diagnostics
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -euo pipefail
          APP_BUILDER="node_modules/app-builder-bin/linux/x64/app-builder"
          ls -lah "$APP_BUILDER"
          file "$APP_BUILDER"
          ldd "$APP_BUILDER" || true

      - name: Build Electron App (Linux, debug)
        if: startsWith(matrix.os, 'ubuntu-')
        env:
          DEBUG: electron-builder,builder-util
          ELECTRON_BUILDER_LOG_LEVEL: debug
        run: npm run ${{ matrix.dist_script }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
