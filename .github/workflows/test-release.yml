name: Test Release Build

on:
  push:
    branches:
      - test-release
      - test-release/**
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: mac-arm64
            dist_script: dist:mac:arm64
          - os: windows-2022
            artifact: win-x64
            dist_script: dist:win

    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SKIP_DECKLINK_HELPER_BUILD: "1"
      DECKLINK_HELPER_URL_ARM64: ${{ secrets.DECKLINK_HELPER_URL_ARM64 }}
      DECKLINK_HELPER_SHA256_ARM64: ${{ secrets.DECKLINK_HELPER_SHA256_ARM64 }}
      DECKLINK_HELPER_URL_X64: ${{ secrets.DECKLINK_HELPER_URL_X64 }}
      DECKLINK_HELPER_SHA256_X64: ${{ secrets.DECKLINK_HELPER_SHA256_X64 }}
      SDL2_MACOS_URL_ARM64: ${{ secrets.SDL2_MACOS_URL_ARM64 }}
      SDL2_MACOS_SHA256_ARM64: ${{ secrets.SDL2_MACOS_SHA256_ARM64 }}
      SDL2_MACOS_URL_X64: ${{ secrets.SDL2_MACOS_URL_X64 }}
      SDL2_MACOS_SHA256_X64: ${{ secrets.SDL2_MACOS_SHA256_X64 }}
      BRIDGE_RELAY_JWKS_URL_RC: ${{ secrets.BRIDGE_RELAY_JWKS_URL_RC }}
      RELAY_URL_RC: ${{ secrets.RELAY_URL_RC }}
      MODNET_MODEL_URL: ${{ secrets.MODNET_MODEL_URL }}
      DISPLAY_HELPER_MACOSX_DEPLOYMENT_TARGET: "13.0"
      MACOS_FLOOR_VERSION: "13.0"
      SDL2_STRICT_MINOS: "1"
      GYP_MSVS_VERSION: "2022"
      npm_config_msvs_version: "2022"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve test release relay config
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RELAY_URL_RC:-}" || -z "${BRIDGE_RELAY_JWKS_URL_RC:-}" ]]; then
            echo "Test releases require RELAY_URL_RC and BRIDGE_RELAY_JWKS_URL_RC secrets." >&2
            exit 1
          fi

          echo "BROADIFY_UPDATER_CHANNEL=rc" >> "$GITHUB_ENV"
          echo "RESOLVED_RELAY_URL=${RELAY_URL_RC}" >> "$GITHUB_ENV"
          echo "RESOLVED_BRIDGE_RELAY_JWKS_URL=${BRIDGE_RELAY_JWKS_URL_RC}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/bridge/package-lock.json

      - name: Install root deps
        if: matrix.os != 'windows-2022'
        run: npm ci

      - name: Install root deps (Windows, retry)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Running npm ci (attempt $attempt/$maxAttempts)..."
            & npm ci

            if ($LASTEXITCODE -eq 0) {
              Write-Host "npm ci succeeded."
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Warning "npm ci failed with exit code $LASTEXITCODE. Retrying in 20 seconds..."
              Start-Sleep -Seconds 20
            }
          }

          throw "npm ci failed after $maxAttempts attempts."

      - name: Install Bridge dependencies
        if: matrix.os != 'windows-2022'
        run: |
          cd apps/bridge
          npm ci

      - name: Install Bridge dependencies (Windows, retry)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Running apps/bridge npm ci (attempt $attempt/$maxAttempts)..."
            Push-Location apps/bridge
            & npm ci
            $exitCode = $LASTEXITCODE
            Pop-Location

            if ($exitCode -eq 0) {
              Write-Host "apps/bridge npm ci succeeded."
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Warning "apps/bridge npm ci failed with exit code $exitCode. Retrying in 20 seconds..."
              Start-Sleep -Seconds 20
            }
          }

          throw "apps/bridge npm ci failed after $maxAttempts attempts."

      - name: Install Linux packaging dependencies (AppImage)
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          if apt-cache show libfuse2 >/dev/null 2>&1; then
            sudo apt-get install -y libfuse2 file
          else
            sudo apt-get install -y libfuse2t64 file
          fi

      - name: Build Bridge (apps/bridge)
        run: |
          cd apps/bridge
          npm run build

      - name: Prepare Bridge config for packaging
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p apps/bridge/dist
          {
            echo "# Generated by test release workflow"
            echo "BROADIFY_UPDATER_CHANNEL=${BROADIFY_UPDATER_CHANNEL:-rc}"
            echo "RELAY_URL=${RESOLVED_RELAY_URL}"
            echo "BRIDGE_RELAY_JWKS_URL=${RESOLVED_BRIDGE_RELAY_JWKS_URL}"
          } > apps/bridge/dist/.env

          node -e "
            const fs = require('fs');
            const p = 'config/default.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.relay = c.relay || {};
            c.relay.jwksUrl = process.env.RESOLVED_BRIDGE_RELAY_JWKS_URL;
            fs.writeFileSync(p, JSON.stringify(c, null, 2));
          "
          echo "Bridge test config prepared"

      - name: Resolve SDL2 bundle (macOS, for display-helper)
        if: matrix.os == 'macos-15'
        run: npm run ensure:sdl2-macos

      # node-gyp (used by build:framebus) requires distutils, removed in Python 3.12+
      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup MSVC Developer Command Prompt (Windows)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: 2022

      - name: Install SDL2 (Windows, for display-helper)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            if (Test-Path 'C:\vcpkg') {
              $vcpkgRoot = 'C:\vcpkg'
            } else {
              $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
            }
          }

          if (-not (Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }

          $vcpkgExe = Join-Path $vcpkgRoot 'vcpkg.exe'
          if (-not (Test-Path $vcpkgExe)) {
            & (Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat') -disableMetrics
          }

          & $vcpkgExe install sdl2:x64-windows

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SDL2_DIR=$(Join-Path $vcpkgRoot 'installed\x64-windows')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install ONNX Runtime (Windows, for meeting-helper MODNet)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '1.26.0'
          $pkg = "onnxruntime-win-x64-$version"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$version/$pkg.zip"
          $tmp = Join-Path $env:RUNNER_TEMP 'onnxruntime'
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          $zip = Join-Path $tmp "$pkg.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $tmp -Force

          $dest = Join-Path $env:GITHUB_WORKSPACE 'apps\bridge\native\meeting-helper\deps\onnxruntime\windows-x64'
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Recurse -Force (Join-Path $tmp "$pkg\*") $dest

          if (-not (Test-Path (Join-Path $dest 'include\onnxruntime_cxx_api.h'))) {
            throw "ONNX Runtime headers missing after extraction under $dest"
          }
          if (-not (Test-Path (Join-Path $dest 'lib\onnxruntime.dll'))) {
            throw "ONNX Runtime DLL missing after extraction under $dest"
          }
          Write-Host "ONNX Runtime $version installed to $dest"

      - name: Cache MODNet model (meeting-helper, Windows only)
        if: matrix.os == 'windows-2022'
        uses: actions/cache@v4
        with:
          path: apps/bridge/native/meeting-helper/models/modnet.onnx
          key: modnet-model-${{ hashFiles('apps/bridge/native/meeting-helper/models/manifest.json') }}

      - name: Download MODNet model (meeting-helper, Windows only)
        if: matrix.os == 'windows-2022'
        run: npm run download:modnet-model

      - name: Transpile Electron
        run: npm run transpile:electron

      - name: Build React
        run: npm run build

      - name: Install Azure Trusted Signing module (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # electron-builder 25.x signs Windows artifacts by invoking
          # `Invoke-TrustedSigning` from the TrustedSigning PowerShell module.
          # The module is not preinstalled on the Windows runner and
          # electron-builder's implicit install is unreliable (results in
          # "cmdlet not recognized"), so install and verify it explicitly.
          if (-not (Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue)) {
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser | Out-Null
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable -Name TrustedSigning)) {
            Install-Module -Name TrustedSigning -Force -Scope CurrentUser -Repository PSGallery
          }
          Import-Module TrustedSigning
          Get-Command Invoke-TrustedSigning | Format-List Name, Version, Source

      - name: Repair WiX ICE prerequisites (Windows, for MSI build)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # WiX light.exe runs ICE validation through the Windows Installer
          # scripting engine. On hosted Windows runners these COM DLLs can be
          # unregistered, which surfaces as ICE93-ICE105 validation failures.
          $targets = @(
            @{ RegSvr = "$env:SystemRoot\System32\regsvr32.exe";  Dir = "$env:SystemRoot\System32"  },
            @{ RegSvr = "$env:SystemRoot\SysWOW64\regsvr32.exe"; Dir = "$env:SystemRoot\SysWOW64" }
          )
          foreach ($target in $targets) {
            foreach ($dll in @('vbscript.dll', 'jscript.dll')) {
              $path = Join-Path $target.Dir $dll
              if (Test-Path $path) {
                & $target.RegSvr /s $path
              }
            }
          }

          # Ensure the Windows Installer service can be opened by WiX ICE validation.
          $msiexec = "$env:SystemRoot\System32\msiexec.exe"
          Start-Process $msiexec -ArgumentList '/unregister' -Wait -NoNewWindow -ErrorAction SilentlyContinue
          Start-Process $msiexec -ArgumentList '/regserver'  -Wait -NoNewWindow -ErrorAction SilentlyContinue

          try {
            Set-Service -Name msiserver -StartupType Manual -ErrorAction Stop
            Start-Service -Name msiserver -ErrorAction Stop
            (Get-Service msiserver | Format-List Name, Status, StartType | Out-String) | Write-Host
          } catch {
            Write-Warning "Could not start msiserver service: $_"
          }

      - name: Build Electron App
        if: ${{ !startsWith(matrix.os, 'ubuntu-') }}
        run: npm run ${{ matrix.dist_script }} -- --publish=never

      - name: Linux packaging diagnostics
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -euo pipefail
          APP_BUILDER="node_modules/app-builder-bin/linux/x64/app-builder"
          ls -lah "$APP_BUILDER"
          file "$APP_BUILDER"
          ldd "$APP_BUILDER" || true

      - name: Build Electron App (Linux, debug)
        if: startsWith(matrix.os, 'ubuntu-')
        env:
          DEBUG: electron-builder,builder-util
          ELECTRON_BUILDER_LOG_LEVEL: debug
        run: npm run ${{ matrix.dist_script }} -- --publish=never

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn
